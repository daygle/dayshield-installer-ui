# busybox httpd configuration
# Place this file at /installer-ui/httpd.conf
#
# Format: A:<path>  — allow CGI execution for scripts under <path>
#
# All shell scripts in /api/ are treated as CGI programs.
# busybox httpd executes files ending in .sh when they are located
# in the cgi-bin directory OR when CGI is globally enabled.

# Execute .sh files using /bin/sh so /api/*.sh works as CGI.
*.sh:/bin/sh
